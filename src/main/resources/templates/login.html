<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papelería La Colonial | Acceso al Sistema</title>
    <link rel="icon" type="image/png" th:href="@{/img/favicon.png}">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- CSS Personalizado -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-light) 0%, #E9ECEF 100%);
            padding: 2rem;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo-img {
            max-width: 260px; /* Ajusta este tamaño según veas el render de tu imagen */
            height: auto;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">

        <!-- Logo de La Colonial -->
        <div class="logo-container">
            <img th:src="@{/img/logo.png}" alt="Papelería La Colonial" class="logo-img">
        </div>

        <div class="card premium-card p-4 p-md-5">
            <div class="mb-4 text-center">
                <h4 class="fw-bold mb-1" style="color: var(--brand-shadow);">Portal de Gestión</h4>
                <p class="text-muted small">Ingresa tus credenciales para continuar</p>
            </div>

            <!-- Alertas de Spring Security -->
            <div th:if="${param.error}" class="alert border-0 text-center small mb-4 py-2" style="background-color: #FDE8E8; color: var(--brand-autumn); border-radius: 8px;">
                <i class="bi bi-shield-lock-fill me-2"></i> Credenciales incorrectas.
            </div>
            <div th:if="${param.logout}" class="alert border-0 text-center small mb-4 py-2" style="background-color: #E8F4EC; color: var(--brand-stone); border-radius: 8px;">
                <i class="bi bi-check-circle-fill me-2"></i> Sesión finalizada correctamente.
            </div>

            <form th:action="@{/login-post}" method="post">
                <div class="mb-4">
                    <label class="form-label label-premium">Usuario</label>
                    <input type="text" name="username" class="form-control input-premium" placeholder="ej. admin" required autofocus autocomplete="off">
                </div>

                <div class="mb-5">
                    <label class="form-label label-premium">Contraseña</label>
                    <input type="password" name="password" class="form-control input-premium" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-premium w-100">
                    Iniciar Sesión
                </button>
            </form>
        </div>


    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
