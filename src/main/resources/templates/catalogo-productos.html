<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Catálogo de Productos')}"></head>
<style>
    /* Estilos premium para la tabla de datos */
    .table-premium {
        background-color: var(--white);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(42, 49, 50, 0.03);
    }
    .table-premium thead th {
        background-color: var(--brand-mist);
        color: var(--white);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 0.75rem;
        border: none;
        padding: 15px 20px;
    }
    .table-premium tbody td {
        vertical-align: middle;
        padding: 15px 20px;
        color: var(--brand-shadow);
        border-bottom: 1px solid rgba(0,0,0,0.03);
    }
    .table-premium tbody tr:hover {
        background-color: #F8FBFC;
    }
    /* Alerta de inventario usando la paleta de la marca */
    .stock-alert {
        color: var(--brand-autumn);
        font-weight: 700;
        background-color: rgba(118, 54, 38, 0.1);
        padding: 4px 10px;
        border-radius: 6px;
    }
    .stock-ok {
        color: var(--brand-stone);
        font-weight: 600;
    }
</style>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="main-content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="content-body">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold mb-0" style="color: var(--brand-shadow);">Inventario de Productos</h4>
                    <p class="text-muted small mb-0">Gestión de catálogo físico</p>
                </div>
                <button class="btn btn-premium" onclick="abrirModalCrear()">
                    <i class="bi bi-plus-lg me-2"></i>Nuevo Producto
                </button>
            </div>

            <div class="card premium-card p-3 mb-4">
                <div class="row align-items-center">
                    <div class="col-md-8">
                        <div class="input-group">
                                <span class="input-group-text bg-white border-end-0" style="color: var(--brand-mist);">
                                    <i class="bi bi-upc-scan"></i>
                                </span>
                            <input type="text" id="inputBusqueda" class="form-control input-premium border-start-0 ps-0"
                                   placeholder="Escanea el código de barras o busca por nombre..." autofocus onkeypress="manejarBusqueda(event)">
                        </div>
                    </div>
                    <div class="col-md-4 text-end">
                        <button class="btn btn-outline-secondary" onclick="cargarProductos()">
                            <i class="bi bi-arrow-clockwise"></i> Refrescar
                        </button>
                        <button class="btn btn-warning text-dark ms-2" onclick="cargarAlertasStock()">
                            <i class="bi bi-exclamation-triangle"></i> Ver Alertas
                        </button>
                    </div>
                </div>
            </div>

            <div class="table-responsive table-premium">
                <table class="table mb-0">
                    <thead>
                    <tr>
                        <th>Código</th>
                        <th>Producto</th>
                        <th>Precio Compra</th>
                        <th>Precio Venta</th>
                        <th>Stock Actual</th>
                        <th class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tablaProductos">
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div class="modal fade" id="modalProducto" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 15px; border: none;">
            <div class="modal-header" style="background-color: var(--brand-mist); color: white; border-radius: 15px 15px 0 0;">
                <h5 class="modal-title fw-bold" id="modalTitulo">Nuevo Producto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <form id="formProducto">
                    <input type="hidden" id="prodId">
                    <div class="mb-3">
                        <label class="label-premium">Código de Barras</label>
                        <input type="text" class="form-control input-premium" id="prodCodigo" required>
                    </div>
                    <div class="mb-3">
                        <label class="label-premium">Nombre del Producto</label>
                        <input type="text" class="form-control input-premium" id="prodNombre" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="label-premium">Precio Compra ($)</label>
                            <input type="number" step="0.01" class="form-control input-premium" id="prodCompra" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="label-premium">Precio Venta ($)</label>
                            <input type="number" step="0.01" class="form-control input-premium" id="prodVenta" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="label-premium">Stock Actual</label>
                            <input type="number" class="form-control input-premium" id="prodStock" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="label-premium">Stock Mínimo</label>
                            <input type="number" class="form-control input-premium" id="prodMinimo" required>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-premium" onclick="guardarProducto()">Guardar Producto</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalAbastecer" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content" style="border-radius: 15px;">
            <div class="modal-body p-4 text-center">
                <i class="bi bi-box-arrow-in-down fs-1" style="color: var(--brand-stone);"></i>
                <h5 class="fw-bold mt-2">Ingreso de Mercancía</h5>
                <p class="small text-muted" id="txtAbastecerNombre"></p>
                <input type="hidden" id="abastecerId">
                <div class="mb-3 text-start">
                    <label class="label-premium">Cantidad a sumar</label>
                    <input type="number" class="form-control input-premium text-center fs-4" id="abastecerCantidad" min="1" value="1">
                </div>
                <button type="button" class="btn btn-premium w-100" onclick="procesarAbastecimiento()">Ingresar al Inventario</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalMerma" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 15px;">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold text-danger"><i class="bi bi-exclamation-octagon me-2"></i>Reportar Merma</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <p class="small text-muted mb-4">La merma se descontará del inventario y quedará registrada inmutablemente en la bitácora de auditoría.</p>

                <h6 class="fw-bold" id="txtMermaNombre" style="color: var(--brand-shadow);"></h6>
                <p class="small text-muted mb-3">Stock actual en sistema: <span id="txtMermaStockActual" class="fw-bold text-dark"></span></p>

                <input type="hidden" id="mermaId">

                <div class="mb-3">
                    <label class="label-premium">Cantidad a descontar (Pérdida)</label>
                    <input type="number" class="form-control input-premium fs-5" id="mermaCantidad" min="1" value="1">
                </div>
                <div class="mb-4">
                    <label class="label-premium">Motivo detallado</label>
                    <textarea class="form-control input-premium" id="mermaMotivo" rows="2" placeholder="Ej. El producto llegó roto desde el proveedor..." required></textarea>
                </div>
                <button type="button" class="btn btn-danger w-100 fw-bold" onclick="procesarMerma()">Registrar Merma Permanentemente</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Variables globales
    let modalProd;
    let modalAbast;
    let modalMerm; // Variable para el modal de mermas

    document.addEventListener('DOMContentLoaded', function() {
        modalProd = new bootstrap.Modal(document.getElementById('modalProducto'));
        modalAbast = new bootstrap.Modal(document.getElementById('modalAbastecer'));
        modalMerm = new bootstrap.Modal(document.getElementById('modalMerma')); // Inicializado

        cargarProductos();
    });

    function cargarProductos() {
        fetch('/api/productos')
            .then(res => {
                if (!res.ok) throw new Error('Error HTTP: ' + res.status);
                return res.json();
            })
            .then(data => renderizarTabla(data))
            .catch(err => {
                const tbody = document.getElementById('tablaProductos');
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger py-4"><b>Error al conectar con la API:</b> ${err.message}. Revisa la consola (F12).</td></tr>`;
            });
    }

    function cargarAlertasStock() {
        fetch('/api/productos/alertas-stock')
            .then(res => res.json())
            .then(data => renderizarTabla(data));
    }

    function manejarBusqueda(event) {
        if (event.key === 'Enter') {
            const query = document.getElementById('inputBusqueda').value.trim();
            if (query === '') return cargarProductos();

            if(!isNaN(query) && query.length > 5) {
                fetch(`/api/productos/codigo/${query}`)
                    .then(res => {
                        if(res.ok) return res.json();
                        throw new Error('No encontrado');
                    })
                    .then(prod => renderizarTabla([prod]))
                    .catch(() => alert('Producto no encontrado con ese código.'));
            } else {
                fetch(`/api/productos/buscar?nombre=${query}`)
                    .then(res => res.json())
                    .then(data => renderizarTabla(data));
            }
        }
    }

    function renderizarTabla(productos) {
        const tbody = document.getElementById('tablaProductos');
        tbody.innerHTML = '';

        productos.sort((a, b) => a.nombre.localeCompare(b.nombre));

        if(productos.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">No se encontraron productos.</td></tr>`;
            return;
        }

        productos.forEach(p => {
            const estaCritico = p.stock <= p.stockMinimo;
            const stockClass = estaCritico ? 'stock-alert' : 'stock-ok';
            const stockIcon = estaCritico ? '<i class="bi bi-exclamation-circle-fill me-1"></i>' : '';

            const esActivo = p.activo !== false;
            const opacidad = esActivo ? '1' : '0.5';
            const badgeInactivo = esActivo ? '' : '<span class="badge bg-danger ms-2">Inactivo</span>';

            const btnOjo = esActivo ?
                `<button class="btn btn-sm btn-light text-warning me-1" onclick="alternarEstado(${p.id})" title="Desactivar (Ocultar)"><i class="bi bi-eye-slash"></i></button>` :
                `<button class="btn btn-sm btn-light text-success me-1" onclick="alternarEstado(${p.id})" title="Activar (Mostrar)"><i class="bi bi-eye"></i></button>`;

            // Lógica para escapar comillas simples en el nombre y evitar que JS truene
            const nombreEscapado = p.nombre.replace(/'/g, "\\'");

            tbody.innerHTML += `
                    <tr style="opacity: ${opacidad}; transition: all 0.3s;">
                        <td class="fw-bold" style="color: var(--brand-mist);">${p.codigoBarras || 'N/A'}</td>
                        <td class="fw-bold">${p.nombre} ${badgeInactivo}</td>
                        <td>$${p.precioCompra.toFixed(2)}</td>
                        <td>$${p.precioVenta.toFixed(2)}</td>
                        <td><span class="${stockClass}">${stockIcon}${p.stock}</span></td>
                        <td class="text-end text-nowrap">
                            <button class="btn btn-sm btn-light text-primary me-1" onclick="abrirModalAbastecer(${p.id}, '${nombreEscapado}')" title="Ingresar Mercancía" ${!esActivo ? 'disabled' : ''}>
                                <i class="bi bi-box-arrow-in-down"></i>
                            </button>

                            <button class="btn btn-sm btn-light text-danger me-1" onclick="abrirModalMerma(${p.id}, '${nombreEscapado}', ${p.stock})" title="Reportar Merma" ${!esActivo ? 'disabled' : ''}>
                                <i class="bi bi-exclamation-octagon"></i>
                            </button>
                            <button class="btn btn-sm btn-light text-secondary me-1" onclick="editarProducto(${p.id})" title="Editar">
                                <i class="bi bi-pencil"></i>
                            </button>
                            ${btnOjo}
                            <button class="btn btn-sm btn-light text-danger" onclick="eliminarProducto(${p.id})" title="Eliminar Permanente">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
        });
    }

    function alternarEstado(id) {
        if(confirm('¿Deseas cambiar el estado de este producto?')) {
            fetch(`/api/productos/${id}/estado`, { method: 'PATCH' })
                .then(res => {
                    if(res.ok) {
                        cargarProductos();
                    } else {
                        alert('Error al cambiar el estado del producto.');
                    }
                });
        }
    }

    function abrirModalCrear() {
        document.getElementById('formProducto').reset();
        document.getElementById('prodId').value = '';
        document.getElementById('modalTitulo').innerText = 'Nuevo Producto';
        modalProd.show();
    }

    function editarProducto(id) {
        fetch(`/api/productos/${id}`)
            .then(res => res.json())
            .then(p => {
                document.getElementById('prodId').value = p.id;
                document.getElementById('prodCodigo').value = p.codigoBarras;
                document.getElementById('prodNombre').value = p.nombre;
                document.getElementById('prodCompra').value = p.precioCompra;
                document.getElementById('prodVenta').value = p.precioVenta;
                document.getElementById('prodStock').value = p.stock;
                document.getElementById('prodMinimo').value = p.stockMinimo;
                document.getElementById('modalTitulo').innerText = 'Editar Producto';
                modalProd.show();
            });
    }

    function guardarProducto() {
        const id = document.getElementById('prodId').value;
        const producto = {
            codigoBarras: document.getElementById('prodCodigo').value,
            nombre: document.getElementById('prodNombre').value,
            precioCompra: document.getElementById('prodCompra').value,
            precioVenta: document.getElementById('prodVenta').value,
            stock: document.getElementById('prodStock').value,
            stockMinimo: document.getElementById('prodMinimo').value
        };

        const url = id ? `/api/productos/${id}` : '/api/productos';
        const method = id ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(producto)
        }).then(res => {
            if(res.ok) {
                modalProd.hide();
                cargarProductos();
            } else {
                res.text().then(err => alert("Error: " + err));
            }
        });
    }

    function abrirModalAbastecer(id, nombre) {
        document.getElementById('abastecerId').value = id;
        document.getElementById('txtAbastecerNombre').innerText = nombre;
        document.getElementById('abastecerCantidad').value = 1;
        modalAbast.show();
        setTimeout(() => document.getElementById('abastecerCantidad').focus(), 500);
    }

    function procesarAbastecimiento() {
        const id = document.getElementById('abastecerId').value;
        const cantidad = document.getElementById('abastecerCantidad').value;

        fetch(`/api/productos/${id}/abastecer?cantidad=${cantidad}`, { method: 'PATCH' })
            .then(res => {
                if(res.ok) {
                    modalAbast.hide();
                    cargarProductos();
                } else {
                    alert('Error al abastecer inventario');
                }
            });
    }

    // --- NUEVAS FUNCIONES DE MERMA ---
    function abrirModalMerma(id, nombre, stockActual) {
        if (stockActual <= 0) {
            alert("No puedes reportar mermas de un producto que no tiene stock.");
            return;
        }
        document.getElementById('mermaId').value = id;
        document.getElementById('txtMermaNombre').innerText = nombre;
        document.getElementById('txtMermaStockActual').innerText = stockActual;

        const inputCant = document.getElementById('mermaCantidad');
        inputCant.value = 1;
        inputCant.max = stockActual; // Validamos visualmente que no devuelva de más

        document.getElementById('mermaMotivo').value = '';
        modalMerm.show();
        setTimeout(() => document.getElementById('mermaCantidad').focus(), 500);
    }

    function procesarMerma() {
        const id = document.getElementById('mermaId').value;
        const cantidad = document.getElementById('mermaCantidad').value;
        const motivo = document.getElementById('mermaMotivo').value.trim();

        if (motivo === '') {
            alert("El motivo detallado es obligatorio por temas de auditoría.");
            document.getElementById('mermaMotivo').focus();
            return;
        }

        // Enviamos los datos vía URL parameters (igual que el abastecimiento)
        fetch(`/api/productos/${id}/merma?cantidad=${cantidad}&motivo=${encodeURIComponent(motivo)}`, { method: 'PATCH' })
            .then(async res => {
                if(res.ok) {
                    modalMerm.hide();
                    cargarProductos();
                } else {
                    const err = await res.text();
                    alert('Error al reportar la merma: ' + err);
                }
            });
    }
    // ---------------------------------

    function eliminarProducto(id) {
        if(confirm('¿Estás seguro de que deseas eliminar este producto? (Si tiene historial de ventas, el sistema lo impedirá).')) {
            fetch(`/api/productos/${id}`, { method: 'DELETE' })
                .then(res => {
                    if(res.ok) {
                        cargarProductos();
                    } else {
                        res.text().then(err => alert(err));
                    }
                });
        }
    }
</script>
</body>
</html>
