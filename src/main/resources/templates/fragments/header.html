<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="header" class="top-header">
    <div>
        <h5 class="mb-0 fw-bold" style="color: var(--brand-stone);">Panel de Control</h5>
    </div>
    <div class="d-flex align-items-center gap-3">
        <div class="text-end">
            <div class="fw-bold" th:text="${usuarioLogueado?.username}">Usuario</div>
            <div class="badge-rol text-uppercase" th:text="${usuarioLogueado?.rol}">ROL</div>
        </div>

        <form th:action="@{/logout}" method="post" class="m-0">
            <button type="submit" class="btn btn-light text-danger border-0">
                <i class="bi bi-box-arrow-right fs-5"></i>
            </button>
        </form>
    </div>
</header>
</body>
</html>
