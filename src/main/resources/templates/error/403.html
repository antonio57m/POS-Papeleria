<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Acceso Denegado')}"></head>
<body style="background-color: var(--bg-light);">

<div class="d-flex align-items-center justify-content-center vh-100">
    <div class="card premium-card border-0 shadow-lg text-center" style="max-width: 500px; width: 100%; border-radius: 15px; overflow: hidden;">

        <div style="height: 10px; background-color: var(--brand-autumn);"></div>

        <div class="card-body p-5">
            <div class="mb-4">
                <i class="bi bi-shield-lock-fill" style="font-size: 5rem; color: var(--brand-shadow);"></i>
            </div>

            <h2 class="fw-bold mb-3" style="color: var(--brand-shadow);">Acceso Restringido</h2>
            <h5 class="text-muted mb-4">Error 403 - Prohibido</h5>

            <p class="text-muted mb-5">
                Tu rol actual en el sistema no tiene los privilegios necesarios para visualizar o modificar el contenido de esta sección.
                Si consideras que esto es un error, por favor contacta al administrador.
            </p>

            <a th:href="@{/dashboard}" class="btn btn-premium btn-lg w-100" style="background-color: var(--brand-stone); border-color: var(--brand-stone);">
                <i class="bi bi-arrow-left-circle me-2"></i> Volver al Panel Principal
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
