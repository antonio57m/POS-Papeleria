<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Catálogo de Servicios')}"></head>
<style>
    /* Estilos premium consistentes con Productos y Personal */
    .table-premium {
        background-color: var(--white);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 4px 15px rgba(42, 49, 50, 0.03);
    }
    .table-premium thead th {
        background-color: var(--brand-mist); /* Homologado con el resto del sistema */
        color: var(--white);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-size: 0.75rem;
        border: none;
        padding: 15px 20px;
    }
    .table-premium tbody td {
        vertical-align: middle;
        padding: 15px 20px;
        color: var(--brand-shadow);
        border-bottom: 1px solid rgba(0,0,0,0.03);
    }
    .table-premium tbody tr:hover {
        background-color: #F8FBFC;
    }
</style>
<body>
<div class="app-wrapper">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <main class="main-content">
        <div th:replace="~{fragments/header :: header}"></div>

        <div class="content-body">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold mb-0" style="color: var(--brand-shadow);">Catálogo de Servicios</h4>
                    <p class="text-muted small mb-0">Gestión de intangibles (Copias, Escaneos, Trámites)</p>
                </div>
                <button class="btn btn-premium" onclick="abrirModalCrear()">
                    <i class="bi bi-plus-lg me-2"></i>Nuevo Servicio
                </button>
            </div>

            <div class="card premium-card p-3 mb-4 border-0 shadow-sm" style="border-radius: 12px;">
                <div class="row align-items-center">
                    <div class="col-md-9">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0" style="color: var(--brand-mist);">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" id="inputBusqueda" class="form-control input-premium border-start-0 ps-0"
                                   placeholder="Buscar servicio por nombre..." onkeyup="manejarBusqueda()">
                        </div>
                    </div>
                    <div class="col-md-3 text-end">
                        <button class="btn btn-outline-secondary w-100 fw-bold" onclick="cargarServicios()">
                            <i class="bi bi-arrow-clockwise me-2"></i> Refrescar
                        </button>
                    </div>
                </div>
            </div>

            <div class="table-responsive table-premium">
                <table class="table mb-0">
                    <thead>
                    <tr>
                        <th width="10%">ID</th>
                        <th width="50%">Nombre del Servicio</th>
                        <th width="20%">Precio Venta</th>
                        <th width="20%" class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody id="tablaServicios">
                    <tr><td colspan="4" class="text-center text-muted py-4">Cargando servicios...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<div class="modal fade" id="modalServicio" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 15px; border: none;">
            <div class="modal-header" style="background-color: var(--brand-mist); color: white; border-radius: 15px 15px 0 0;">
                <h5 class="modal-title fw-bold" id="modalTitulo">Nuevo Servicio</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">

                <div class="alert alert-info border-0 bg-light small mb-4" style="border-radius: 8px;">
                    <i class="bi bi-info-circle-fill text-info me-2"></i>
                    <b>Tip de Cobro:</b> Si el servicio tiene un precio que varía, pon el precio en <b>0.00</b>. El cajero tecleará el monto al momento de cobrar.
                </div>

                <form id="formServicio">
                    <input type="hidden" id="servId">
                    <div class="mb-3">
                        <label class="label-premium">Nombre del Servicio</label>
                        <input type="text" class="form-control input-premium" id="servNombre" placeholder="Ej. Impresión Color" required>
                    </div>
                    <div class="mb-3">
                        <label class="label-premium">Precio Venta ($)</label>
                        <input type="number" step="0.01" class="form-control input-premium" id="servVenta" placeholder="0.00" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-premium" onclick="guardarServicio()">Guardar Servicio</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let modalServ;
    let debounceTimer;

    document.addEventListener('DOMContentLoaded', function() {
        modalServ = new bootstrap.Modal(document.getElementById('modalServicio'));
        cargarServicios();
    });

    function cargarServicios() {
        fetch('/api/servicios')
            .then(res => res.json())
            .then(data => renderizarTabla(data))
            .catch(err => alert("Error cargando servicios: " + err));
    }

    function manejarBusqueda() {
        clearTimeout(debounceTimer);
        const query = document.getElementById('inputBusqueda').value.trim();

        debounceTimer = setTimeout(() => {
            if (query === '') {
                cargarServicios();
            } else {
                fetch(`/api/servicios/buscar?nombre=${query}`)
                    .then(res => res.json())
                    .then(data => renderizarTabla(data));
            }
        }, 300);
    }

    function renderizarTabla(servicios) {
        const tbody = document.getElementById('tablaServicios');
        tbody.innerHTML = '';

        // Ordenamiento Alfabético Automático (Mejor UX)
        servicios.sort((a, b) => a.nombre.localeCompare(b.nombre));

        if(servicios.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-4">No se encontraron servicios.</td></tr>`;
            return;
        }

        servicios.forEach(s => {
            const esActivo = s.activo !== false;
            const opacidad = esActivo ? '1' : '0.5';
            const badgeInactivo = esActivo ? '' : '<span class="badge bg-danger ms-2">Inactivo</span>';

            // Si el precio es 0, mostramos un badge indicando que es variable
            const precioDisplay = s.precioVenta === 0 ?
                '<span class="badge bg-warning text-dark"><i class="bi bi-cursor-text me-1"></i>Variable</span>' :
                `$${s.precioVenta.toFixed(2)}`;

            const btnOjo = esActivo ?
                `<button class="btn btn-sm btn-light text-warning me-1" onclick="alternarEstado(${s.id})" title="Desactivar"><i class="bi bi-eye-slash"></i></button>` :
                `<button class="btn btn-sm btn-light text-success me-1" onclick="alternarEstado(${s.id})" title="Activar"><i class="bi bi-eye"></i></button>`;

            tbody.innerHTML += `
                    <tr style="opacity: ${opacidad}; transition: all 0.3s;">
                        <td class="fw-bold" style="color: var(--brand-mist);">#${s.id}</td>
                        <td class="fw-bold">${s.nombre} ${badgeInactivo}</td>
                        <td class="fw-bold" style="color: var(--brand-stone);">${precioDisplay}</td>
                        <td class="text-end">
                            <button class="btn btn-sm btn-light text-secondary me-1" onclick="editarServicio(${s.id})" title="Editar">
                                <i class="bi bi-pencil"></i>
                            </button>
                            ${btnOjo}
                            <button class="btn btn-sm btn-light text-danger" onclick="eliminarServicio(${s.id})" title="Eliminar Permanente">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
        });
    }

    function alternarEstado(id) {
        if(confirm('¿Cambiar estado de este servicio? (Los servicios inactivos no se muestran en el Punto de Venta)')) {
            fetch(`/api/servicios/${id}/estado`, { method: 'PATCH' })
                .then(res => res.ok ? cargarServicios() : alert('Error al cambiar el estado.'));
        }
    }

    function abrirModalCrear() {
        document.getElementById('formServicio').reset();
        document.getElementById('servId').value = '';
        document.getElementById('modalTitulo').innerText = 'Nuevo Servicio';
        modalServ.show();
    }

    function editarServicio(id) {
        fetch(`/api/servicios/${id}`)
            .then(res => res.json())
            .then(s => {
                document.getElementById('servId').value = s.id;
                document.getElementById('servNombre').value = s.nombre;
                document.getElementById('servVenta').value = s.precioVenta;
                document.getElementById('modalTitulo').innerText = 'Editar Servicio';
                modalServ.show();
            });
    }

    function guardarServicio() {
        const id = document.getElementById('servId').value;
        const servicio = {
            nombre: document.getElementById('servNombre').value,
            precioVenta: document.getElementById('servVenta').value || 0
        };

        const url = id ? `/api/servicios/${id}` : '/api/servicios';
        const method = id ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(servicio)
        }).then(res => {
            if(res.ok) {
                modalServ.hide();
                cargarServicios();
            } else {
                res.text().then(err => alert("Error: " + err));
            }
        });
    }

    function eliminarServicio(id) {
        if(confirm('¿Eliminar definitivamente? Si tiene ventas previas, el sistema lo impedirá (usa desactivar en su lugar).')) {
            fetch(`/api/servicios/${id}`, { method: 'DELETE' })
                .then(res => {
                    if(res.ok) cargarServicios();
                    else res.text().then(err => alert(err));
                });
        }
    }
</script>
</body>
</html>
